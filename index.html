            const s = document.querySelector(`input[name="lq${i}"]:checked`);
            const c = document.getElementById(`lq-${i}`);
            c.classList.remove('bg-green-50', 'bg-red-50', 'border-green-300', 'border-red-300');
            if (s && parseInt(s.value) === q.a) { c.classList.add('bg-green-50', 'border-green-300'); sc++; }
            else { c.classList.add('bg-red-50', 'border-red-300'); }
        });
        const fb = document.getElementById('listen-fb');
        fb.classList.remove('hidden', 'text-green-600', 'text-red-500');
        if(sc === qs.length) { fb.innerHTML = "Excellent! 🎉 All correct!"; fb.classList.add('text-green-600', 'fade-in'); }
        else { fb.innerHTML = `Try again. Focus on key details. (${sc}/${qs.length})`; fb.classList.add('text-red-500', 'fade-in'); }
    },

    chkPracI(i, ans, theme) {
        const inp = document.getElementById(`pi-${i}`), fb = document.getElementById(`pfb-${i}`), c = document.getElementById(`pc-${i}`);
        c.classList.remove('bounce', 'shake'); void c.offsetWidth;
        if(inp.value.trim().toLowerCase() === ans.toLowerCase()) {
            inp.className = `flex-1 border-2 border-green-500 bg-green-50 p-4 rounded-xl text-center font-bold text-green-700 text-lg`;
            fb.innerHTML = "Excellent! 🎉"; fb.className = "text-center font-bold mt-6 text-green-600 block fade-in text-[16px]"; c.classList.add('bounce');
        } else {
            inp.className = `flex-1 border-2 border-red-400 bg-red-50 p-4 rounded-xl text-center font-bold text-red-600 text-lg`;
            fb.innerHTML = `Try again. (Hint: <strong>${ans}</strong>)`; fb.className = "text-center font-bold mt-6 text-red-500 block fade-in text-[16px]"; c.classList.add('shake');
        }
    },

    chkPracM(i, sIdx, cIdx, btn, theme) {
        const c = document.getElementById(`pc-${i}`), fb = document.getElementById(`pfb-${i}`);
        c.querySelectorAll('button').forEach(b => b.disabled = true);
        c.classList.remove('bounce', 'shake'); void c.offsetWidth;
        if(sIdx === cIdx) {
            btn.className = "flex-1 py-4 bg-green-50 border-2 border-green-500 rounded-xl font-bold text-green-700 transition text-lg w-full";
            fb.innerHTML = "Excellent! 🎉"; fb.className = "text-center font-bold mt-6 text-green-600 block fade-in text-[16px]"; c.classList.add('bounce');
        } else {
            btn.className = "flex-1 py-4 bg-red-50 border-2 border-red-400 rounded-xl font-bold text-red-600 transition text-lg w-full";
            c.querySelectorAll('button')[cIdx].className = "flex-1 py-4 bg-green-50 border-2 border-green-500 rounded-xl font-bold text-green-700 transition text-lg w-full";
            fb.innerHTML = "Try again. Focus on key details."; fb.className = "text-center font-bold mt-6 text-red-500 block fade-in text-[16px]"; c.classList.add('shake');
        }
    },

    all() { this.sidebar(); this.main(); }
};

// UI Handlers
document.getElementById('btn-menu').onclick = () => { document.getElementById('sidebar').classList.toggle('-translate-x-full'); document.getElementById('mobile-overlay').classList.toggle('hidden'); };
document.getElementById('mobile-overlay').onclick = document.getElementById('btn-menu').onclick;

const aiMdl = document.getElementById('ai-modal');
document.getElementById('btn-ai').onclick = () => aiMdl.classList.remove('hidden');
document.querySelectorAll('.ai-close').forEach(b => b.onclick = () => aiMdl.classList.add('hidden'));
document.getElementById('btn-ai-send').onclick = () => {
    const i = document.getElementById('ai-input'), c = document.getElementById('ai-chat');
    if(!i.value.trim()) return;
    c.innerHTML += `<div class="bg-slate-800 text-white p-3 rounded-2xl rounded-tr-none self-end max-w-[85%] text-sm fade-in shadow-sm">${i.value}</div>`; i.value = ''; c.scrollTop = c.scrollHeight;
    setTimeout(() => { c.innerHTML += `<div class="bg-white p-3 rounded-2xl rounded-tl-none self-start max-w-[85%] text-sm border border-slate-200 shadow-sm font-medium text-slate-800 fade-in"><strong>Kil:</strong> Great question! Keep practicing in your Koala space. 🐨</div>`; c.scrollTop = c.scrollHeight; }, 600);
};

window.onload = () => State.init();
</script>
